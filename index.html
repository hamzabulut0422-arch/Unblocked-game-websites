        /* Style Global */

        body {

            background-color: #000000; /* Fond noir */

            color: #ffffff;           /* Texte blanc */

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            margin: 0;

            padding: 20px;

            display: flex;

            flex-direction: column;

            align-items: center;

        }



        h1 {

            color: #ffffff;

            font-size: 2.5rem;

            margin-bottom: 10px;

            text-transform: uppercase;

            letter-spacing: 2px;

        }



        p.subtitle {

            color: #bbbbbb;

            margin-bottom: 40px;

            font-size: 1.2rem;

        }



        /* Grille de jeux */

        .games-grid {

            display: grid;

            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));

            gap: 25px;

            width: 100%;

            max-width: 1200px;

            padding-bottom: 50px;

        }



        /* Cartes de jeux */

        .game-card {

            background: #1a1a1a; /* Gris très foncé pour les cartes */

            border: 1px solid #333;

            border-radius: 15px;

            overflow: hidden;

            text-decoration: none;

            color: white;

            transition: all 0.3s ease;

            display: flex;

            flex-direction: column;

            box-shadow: 0 4px 15px rgba(0,0,0,0.5);

        }



        .game-card:hover {

            transform: translateY(-10px);

            border-color: #ffffff;

            box-shadow: 0 10px 25px rgba(255,255,255,0.1);

        }



        /* Image fictive (en attendant que tu mettes les tiennes) */

        .game-thumb {

            width: 100%;

            height: 160px;

            background: #333;

            display: flex;

            align-items: center;

            justify-content: center;

            font-size: 3rem;

        }



        .game-title {

            padding: 15px;

            font-weight: bold;

            text-align: center;

            background: #222;

        }



        /* Pied de page (Footer) */

        footer {

            margin-top: auto;

            padding: 30px;

            border-top: 1px solid #333;

            width: 100%;

            text-align: center;

            color: #888;

        }



        footer a {

            color: #ff0050; /* Couleur TikTok */

            text-decoration: none;

            font-weight: bold;

        }



        footer a:hover {

            text-decoration: underline;

        }

    </style>
